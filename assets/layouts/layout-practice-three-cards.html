<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="chrome.css" />
  <title>Practice Three Recommendation Cards</title>
</head>
<body>
  <div class="slide-container">
    <h1 class="practice-title">观察五：批量转让估值定价受到地方政府影响，缺乏科学合理依据</h1>
    <div class="practice-title-rule"></div>

    <p class="practice-lead" style="font-weight:800;">
      地方政府在批量转让过程中可能影响估值过程，银行需要对估值底稿、参与机制和比较口径进行复核。
    </p>

    <section style="position:absolute; left:64px; top:320px; width:560px; height:520px; font-family:'STKaiti','KaiTi','Noto Serif SC',serif; font-size:28px; line-height:1.55;">
      <p>左侧放案例事实或关键背景，每段控制在 4-6 行。若案例事实超过 260 字，应拆成两页。</p>
      <p style="margin-top:28px;">该区域也可替换为小型流程图或估值路径说明。</p>
    </section>

    <section style="position:absolute; left:690px; right:64px; top:330px; height:500px; display:grid; grid-template-columns:repeat(3,1fr); gap:28px;">
      <article class="practice-step-card">
        <div class="practice-step-num" style="position:absolute; transform:translate(110px,-92px);">01</div>
        <p>估值定价过程避免完全由地方主导，增强总行参与，对估值结果进行评估。</p>
      </article>
      <article class="practice-step-card">
        <div class="practice-step-num" style="position:absolute; transform:translate(110px,-92px);">02</div>
        <p>对项目估值底稿进行挑战与复核，确保估值结果的科学性。</p>
      </article>
      <article class="practice-step-card">
        <div class="practice-step-num" style="position:absolute; transform:translate(110px,-92px);">03</div>
        <p>对不同种类资产包引入同类比较机制，避免估值出现较大偏差。</p>
      </article>
    </section>

    <footer class="chrome-footer">
      <div class="src">© 容诚会计师事务所（特殊普通合伙），2025</div>
      <div class="pagenum">14</div>
    </footer>
  </div>
</body>
</html>
