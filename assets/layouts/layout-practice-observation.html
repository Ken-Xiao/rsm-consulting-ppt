  <div class="slide-container">
    <h1 class="practice-title">观察三：批量转让流程执行不到位，处置价格未得到充分市场验证</h1>
    <div class="practice-title-rule"></div>
    <p class="practice-lead">
      不良资产包转让具有非标准化特征，若未经充分竞价和流程验证，容易滋生道德风险，并影响转让价格的公允性。
    </p>

    <section style="position:absolute; left:64px; top:332px; width:1200px; height:380px; background:#EDEDED; border-right:36px solid var(--rsm-practice-blue); padding:42px 52px; font-family:'STKaiti','KaiTi','Noto Serif SC',serif; font-size:28px; line-height:1.65;">
      <p>规则依据或案例发现放在此处。文字可承载 2-3 段，但不能压缩到脚注字号。</p>
      <p style="margin-top:24px; font-weight:800;">案例发现：</p>
      <p>多个资产包在竞价环节报价方不足，流程补登和价格发现机制执行不到位。</p>
    </section>

    <section style="position:absolute; left:96px; right:96px; bottom:116px; height:145px; display:grid; grid-template-columns:1fr 1fr; gap:58px;">
      <div style="display:grid; grid-template-columns:92px 1fr; gap:24px; align-items:center;">
        <div style="font-size:58px; color:var(--rsm-practice-blue);">◎</div>
        <div class="practice-card" style="box-shadow:none; border:none; padding:0; font-size:25px;">
          <strong class="text-blue">转让竞价流程合规</strong><br />关注流程合规性，防范潜在道德风险。
        </div>
      </div>
      <div style="display:grid; grid-template-columns:92px 1fr; gap:24px; align-items:center;">
        <div style="font-size:58px; color:var(--rsm-practice-blue);">▣</div>
        <div class="practice-card" style="box-shadow:none; border:none; padding:0; font-size:25px;">
          <strong class="text-blue">监督审查制度保证</strong><br />必要时建立不良资产转让专项审计制度。
        </div>
      </div>
    </section>
