<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="chrome.css" />
  <title>Insurance Results Chart Card</title>
</head>
<body>
  <div class="slide-container">
    <div class="results-brand-bars">
      <span class="gray"></span><span class="green"></span><span class="blue"></span>
    </div>
    <header class="results-header">
      <div class="deck-title">2025年度上市保险公司业绩盘点</div>
      <div class="module-pill"><span>整体财务结果分析</span><span class="module-num">01</span></div>
    </header>

    <h1 class="results-subtitle">净利润 — 结构对比分析</h1>

    <section class="results-takeaway">
      ✓ 2025年，上市保险公司净利润普遍实现增长，但增长驱动结构存在分化。<br />
      ✓ 承保、投资、所得税和其他项目需按统一口径拆解，避免把会计口径差异误读为经营差异。
    </section>

    <main class="results-chart-card">
      <div style="height:100%; display:grid; place-items:center; color:#667085; font-size:28px;">
        主图区域：双期间堆叠条 / 柱线组合 / 财务贡献拆解
      </div>
    </main>

    <div class="results-footnote">
      以上数据来源于上市公司披露报告；口径说明应列于主图下方，页码置于右下角。
    </div>
    <footer class="chrome-footer">
      <div class="src">© 容诚会计师事务所（特殊普通合伙），2026</div>
      <div class="pagenum">4</div>
    </footer>
  </div>
</body>
</html>
